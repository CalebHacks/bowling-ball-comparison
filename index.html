<!DOCTYPE html>\n<html lang='en'>\n<head>\n    <meta charset='UTF-8'>\n    <meta name='viewport' content='width=device-width, initial-scale=1.0'>\n    <title>Bowling Ball Comparison Tool</title>\n    <style>\n        body { font-family: Arial, sans-serif; margin: 0; padding: 20px; }\n        table { width: 100%; border-collapse: collapse; margin: 20px 0; }\n        th, td { padding: 10px; border: 1px solid #ccc; text-align: left; }\n        th { background-color: #f4f4f4; cursor: pointer; }\n        th.sort-asc::after { content: ' \25B2'; }\n        th.sort-desc::after { content: ' \25B2'; }\n    </style>\n</head>\n<body>\n    <h1>Bowling Ball Comparison Tool</h1>\n    <table id='bowlingTable'>\n        <thead>\n            <tr>\n                <th onclick='sortTable(0)'>Brand</th>\n                <th onclick='sortTable(1)'>Release Date</th>\n                <th onclick='sortTable(2)'>RG</th>\n                <th onclick='sortTable(3)'>Differential</th>\n            </tr>\n        </thead>\n        <tbody id='bowlingTableBody'>\n            <!-- Data will be populated here from bowwwl.com -->\n        </tbody>\n    </table>\n    <script>\n        let bowlingBalls = [];\n        // Fetch Bowling Ball Data from bowwwl.com\n        async function fetchBowlingBalls() {\n            try {\n                const response = await fetch('https://api.bowwwl.com/bowling-balls'); // Replace with actual API URL\n                bowlingBalls = await response.json();\n                populateTable();\n            } catch (error) {\n                console.error('Error fetching bowling balls:', error);\n            }\n        }\n\n        function populateTable() {\n            const tbody = document.getElementById('bowlingTableBody');\n            tbody.innerHTML = ''; // Clear existing table rows\n            bowlingBalls.forEach(ball => {\n                const row = document.createElement('tr');\n                row.innerHTML = `<td>${ball.brand}</td><td>${ball.releaseDate}</td><td>${ball.rg}</td><td>${ball.differential}</td>`;\n                tbody.appendChild(row);\n            });\n        }\n\n        function sortTable(columnIndex) {\n            const table = document.getElementById('bowlingTable');\n            const rows = Array.from(table.rows).slice(1); // Get all rows except the header\n            const isAscending = table.querySelector('th:nth-child(' + (columnIndex + 1) + ')').classList.toggle('sort-asc');\n            rows.sort((rowA, rowB) => {\n                const cellA = rowA.cells[columnIndex].innerText;\n                const cellB = rowB.cells[columnIndex].innerText;\n                return isAscending ? cellA.localeCompare(cellB) : cellB.localeCompare(cellA);\n            });\n            rows.forEach(row => table.appendChild(row)); // Append sorted rows back\n        }\n        // Fetch the balls when the page loads\n        window.onload = fetchBowlingBalls;\n    </script>\n</body>\n</html>\n
